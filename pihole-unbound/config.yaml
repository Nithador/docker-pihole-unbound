name: "Pi-hole + Unbound"
description: "Pi-hole DNS sinkhole with integrated Unbound resolver."
version: "2026.06.0"
slug: "pihole-unbound"
url: "https://github.com/Nithador/docker-pihole-unbound"
image: "ghcr.io/mpgirro/docker-pihole-unbound:2026.06.0"
startup: services
boot: auto
init: false
host_network: true
privileged:
  - NET_ADMIN
arch:
  - amd64
  - aarch64
  - armhf
  - armv7
  - i386
map:
  - addon_config:rw
webui: "http://[HOST]:80/admin/"
options:
  timezone: "UTC"
  web_password: ""
  web_port: 80
schema:
  timezone: str
  web_password: password?
  web_port: port