name: "Pi-hole + Unbound"
description: "Pi-hole DNS sinkhole with integrated Unbound resolver."
version: "2026.06.8"
slug: "pihole-unbound"
url: "https://github.com/Nithador/docker-pihole-unbound"
startup: services
boot: auto
init: false
host_network: true
privileged:
  - NET_ADMIN
arch:
  - aarch64
  - amd64
map:
  - addon_config:rw
webui: "http://[HOST]:[PORT:80]/admin/"
options:
  timezone: "UTC"
  web_password: ""
  web_port: 80
schema:
  timezone: str
  web_password: password?
  web_port: port